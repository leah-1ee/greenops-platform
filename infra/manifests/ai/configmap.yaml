# greenops-ai ConfigMap
# 적용: kubectl apply -f infra/manifests/ai/configmap.yaml
#
# AI 서비스의 비민감 환경변수를 ConfigMap으로 관리한다.
# LLM API 키 등 민감 정보는 Secret으로 별도 관리할 것.

apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-config
  namespace: greenops-ai
  labels:
    app.kubernetes.io/part-of: greenops
data:
  # Carbon Aware SDK - 탄소 강도 데이터 조회 서비스
  CARBON_AWARE_SDK_URL: "http://carbon-aware-sdk.greenops-infra.svc.cluster.local:8080"

  # 백엔드 API 서비스 엔드포인트
  BACKEND_URL: "http://greenops-backend.greenops-backend.svc.cluster.local:8000"

  # 애플리케이션 로그 레벨
  LOG_LEVEL: "INFO"
