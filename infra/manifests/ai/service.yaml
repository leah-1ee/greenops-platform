# greenops-ai Service
# 적용: kubectl apply -f infra/manifests/ai/service.yaml
#
# 클러스터 내부 전용 서비스(ClusterIP).
# 백엔드에서만 호출되므로 외부 노출 불필요.
#
# 다른 네임스페이스에서 접근할 때 사용하는 FQDN:
#   ai-service.greenops-ai.svc.cluster.local:8001

apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: greenops-ai
  labels:
    app.kubernetes.io/part-of: greenops
spec:
  type: ClusterIP
  selector:
    app: ai-service
  ports:
    - name: http
      protocol: TCP
      port: 8001
      targetPort: 8001
