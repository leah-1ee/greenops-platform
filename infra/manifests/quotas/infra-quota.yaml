# greenops-infra ResourceQuota
# 적용: kubectl apply -f infra/manifests/quotas/infra-quota.yaml
#
# 단일 노드 4코어/8GB 기준 파트별 배분:
#   - Carbon Aware SDK 등 경량 데몬 위주로 front와 동일 수치 배정
#   - 모니터링 스택(Prometheus, Kepler)은 별도 네임스페이스(monitoring/kepler)에서
#     운영되므로 이 쿼터에 포함되지 않음

apiVersion: v1
kind: ResourceQuota
metadata:
  name: infra-quota
  namespace: greenops-infra
  labels:
    app.kubernetes.io/part-of: greenops
spec:
  hard:
    requests.cpu: "250m"
    limits.cpu: "500m"
    requests.memory: "256Mi"
    limits.memory: "512Mi"
