apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbon-aware-sdk
  namespace: greenops-infra
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: carbon-aware-sdk
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-05-04T06:56:29Z"
      labels:
        app: carbon-aware-sdk
    spec:
      containers:
      - env:
        - name: ASPNETCORE_URLS
          value: http://+:8080
        - name: DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE
          value: "false"
        - name: LocationDataSourcesConfiguration__LocationSourceFiles__0__DataFileLocation
          value: locations.json
        - name: DataSources__Configurations__ElectricityMaps__APIToken
          valueFrom:
            secretKeyRef:
              key: AUTH_TOKEN
              name: electricitymaps-secret
        image: ghcr.io/green-software-foundation/carbon-aware-sdk:latest
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: carbon-aware-sdk
        ports:
        - containerPort: 8080
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 300m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /app/appsettings.json
          name: app-config
          readOnly: true
          subPath: appsettings.json
        - mountPath: /app/location-sources/json/locations.json
          name: app-config
          readOnly: true
          subPath: locations.json
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccountName: infra-sa
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: carbon-aware-sdk-config
        name: app-config
