# Carbon Aware SDK Service
# 클러스터 내부에서 탄소 집약도 API에 접근하기 위한 ClusterIP 서비스
# 다른 네임스페이스에서 접근 시 사용할 DNS:
#   carbon-aware-sdk.greenops-infra.svc.cluster.local:8080
apiVersion: v1
kind: Service
metadata:
  name: carbon-aware-sdk
  namespace: greenops-infra
spec:
  # 클러스터 내부 전용 (외부 노출 없음)
  type: ClusterIP
  selector:
    app: carbon-aware-sdk
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
