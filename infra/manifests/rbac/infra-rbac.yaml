# greenops-infra RBAC
# 적용: kubectl apply -f infra/manifests/rbac/infra-rbac.yaml
#
# Carbon Aware SDK가 ConfigMap에서 탄소 강도 임계값 등 설정을 읽어야 하므로
# configmaps 읽기 권한을 부여한다. 쓰기는 Helm/kubectl 으로만 수행한다.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-sa
  namespace: greenops-infra
  labels:
    app.kubernetes.io/part-of: greenops

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: infra-role
  namespace: greenops-infra
  labels:
    app.kubernetes.io/part-of: greenops
rules:
  # 자기 네임스페이스 Pod 상태 조회
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Carbon Aware SDK 설정 조회용 (읽기 전용)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: infra-rolebinding
  namespace: greenops-infra
  labels:
    app.kubernetes.io/part-of: greenops
subjects:
  - kind: ServiceAccount
    name: infra-sa
    namespace: greenops-infra
roleRef:
  kind: Role
  name: infra-role
  apiGroup: rbac.authorization.k8s.io
