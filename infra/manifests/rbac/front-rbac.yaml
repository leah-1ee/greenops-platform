# greenops-front RBAC
# 적용: kubectl apply -f infra/manifests/rbac/front-rbac.yaml
#
# 프론트엔드는 정적 파일 서빙만 담당하므로 최소 권한 원칙을 적용한다.
# 자기 네임스페이스 Pod 목록 조회 이상의 권한은 불필요하다.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: front-sa
  namespace: greenops-front
  labels:
    app.kubernetes.io/part-of: greenops

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: front-role
  namespace: greenops-front
  labels:
    app.kubernetes.io/part-of: greenops
rules:
  # 최소 권한: 자기 네임스페이스 Pod 목록 조회만 허용
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: front-rolebinding
  namespace: greenops-front
  labels:
    app.kubernetes.io/part-of: greenops
subjects:
  - kind: ServiceAccount
    name: front-sa
    namespace: greenops-front
roleRef:
  kind: Role
  name: front-role
  apiGroup: rbac.authorization.k8s.io
