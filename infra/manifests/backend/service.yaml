# greenops-backend Service
# 적용: kubectl apply -f infra/manifests/backend/service.yaml
#
# 클러스터 내부 전용 서비스(ClusterIP).
# 외부 노출이 필요한 경우 Ingress 또는 NodePort를 별도로 구성할 것.
#
# 다른 네임스페이스에서 접근할 때 사용하는 FQDN:
#   greenops-backend.greenops-backend.svc.cluster.local:8000

apiVersion: v1
kind: Service
metadata:
  name: greenops-backend
  namespace: greenops-backend
  labels:
    app.kubernetes.io/part-of: greenops
spec:
  type: ClusterIP
  selector:
    app: greenops-backend
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
