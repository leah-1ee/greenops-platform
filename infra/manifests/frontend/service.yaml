# greenops-front Service
# 적용: kubectl apply -f infra/manifests/frontend/service.yaml
#
# NodePort로 외부에 노출한다. 단일 노드(k3s) 환경 기준.
#
# 외부 접속 방법:
#   - 로컬 브라우저 직접 접속: http://<노드IP>:30080
#   - SSH 포트 포워딩 터널:    ssh -L 30080:localhost:30080 <user>@<노드IP>
#                              → 브라우저에서 http://localhost:30080 접속

apiVersion: v1
kind: Service
metadata:
  name: greenops-frontend
  namespace: greenops-front
  labels:
    app.kubernetes.io/part-of: greenops
spec:
  type: NodePort
  selector:
    app: greenops-frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
