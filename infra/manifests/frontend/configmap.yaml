# greenops-front ConfigMap
# 적용: kubectl apply -f infra/manifests/frontend/configmap.yaml
#
# ※ 주의: VITE_ 접두사 환경변수는 Vite가 빌드 시 번들에 인라인으로 삽입한다.
#          따라서 이 ConfigMap의 값은 런타임에 nginx 컨테이너에 주입되어도 효과가 없다.
#          실제 반영은 Docker 빌드 시 --build-arg 로 전달해야 한다:
#            docker build --build-arg VITE_API_BASE_URL=<값> .
#          이 ConfigMap은 빌드 파이프라인 참조용 문서로 활용한다.

apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: greenops-front
  labels:
    app.kubernetes.io/part-of: greenops
data:
  # 백엔드 API 베이스 URL — 브라우저는 클러스터 내부 DNS를 못 씀
  # nginx가 /api/ 요청을 백엔드로 프록시하므로 상대 경로 사용
  VITE_API_BASE_URL: "/api"
